<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {

  width: 100vw;
  height: 100vh;
}

#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  z-index: 0;
  pointer-events: none;
}

#graph-container {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
}

svg { width: 100%; height: 100%; }

svg .link-line {
  stroke-opacity: 0.5;
  fill: none;
}

svg .link-label {
  font-size: 11px;
  fill: #666;
  text-anchor: middle;
  pointer-events: none;
  font-weight: 600;
}

svg .node-glow {
  pointer-events: none;
}

svg .node-circle {
  cursor: pointer;
  stroke-width: 2.5;
  transition: r 0.2s;
}

svg .node-label {
  fill: #2d3748;
  text-anchor: middle;
  pointer-events: none;
  font-weight: 600;
}

svg .node-label-bg {
  fill: rgba(245, 246, 250, 0.8);
  pointer-events: none;
}

/* Detail panel */
#detail-panel {
  position: fixed;
  top: 0;
  right: -480px;
  width: 480px;
  height: 100vh;
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(20px);
  border-left: 1px solid #e2e8f0;
  box-shadow: -8px 0 30px rgba(0,0,0,0.08);
  z-index: 10;
  transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto;
  padding: 0;
}

#detail-panel.open { right: 0; }

#detail-panel .panel-header {
  position: sticky;
  top: 0;
  padding: 28px 28px 20px;
  background: linear-gradient(180deg, rgba(255,255,255,1) 60%, rgba(255,255,255,0));

}

#detail-panel .close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 32px;
  height: 32px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  background: #f7fafc;
  color: #a0aec0;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

#detail-panel .close-btn:hover {
  background: #edf2f7;
  color: #4a5568;
}

#detail-panel .panel-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  color: #1a202c;
}

#detail-panel .panel-group {

  text-transform: uppercase;
  letter-spacing: 1.5px;
  opacity: 0.6;
  margin-bottom: 4px;

#detail-panel .panel-status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 8px;
}

#detail-panel .panel-body {
  padding: 0 28px 40px;
}

#detail-panel .panel-body h3 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #a0aec0;
  margin: 24px 0 10px;

#detail-panel .panel-body ul {
  list-style: none;
  padding: 0;
}

#detail-panel .panel-body li {

  padding: 8px 0 8px 18px;
  font-size: 14px;
  line-height: 1.6;
  color: #4a5568;
  border-bottom: 1px solid #f0f0f5;
}

#detail-panel .panel-body li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 15px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.5;
}

#detail-panel .panel-body .detail-text {
  font-size: 14px;
  line-height: 1.8;
  color: #4a5568;

  border-radius: 4px;
  font-size: 11px;
  margin: 2px 4px 2px 0;
  background: #f7fafc;
  color: #718096;
  border: 1px solid #e2e8f0;

  bottom: 24px;
  left: 24px;
  z-index: 5;

  color: #718096;

  font-weight: 700;
  color: #1a202c;

#page-title p {
  font-size: 12px;
  color: #a0aec0;
  margin-top: 4px;

/* Hint */
#hint {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 5;
  font-size: 11px;
  color: #a0aec0;
}

/* Filter bar */
#filters {

  top: 24px;
  right: 28px;
  z-index: 5;
  display: flex;
  gap: 8px;

#filters button {

  border: 1px solid #e2e8f0;

  color: #2d3748;

/* Scrollbar */
#detail-panel::-webkit-scrollbar { width: 4px; }
#detail-panel::-webkit-scrollbar-track { background: transparent; }
#detail-panel::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 2px; }

// BACKGROUND PARTICLES (Canvas)
// ============================================================
const bgCanvas = document.getElementById("bg-canvas");
const bgCtx = bgCanvas.getContext("2d");
let bgParticles = [];

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}

function initBgParticles() {
  bgParticles = [];
  const count = Math.floor((window.innerWidth * window.innerHeight) / 12000);
  for (let i = 0; i < count; i++) {
    bgParticles.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      alpha: Math.random() * 0.4 + 0.1,
    });
  }
}

function drawBg() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  for (const p of bgParticles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = bgCanvas.width;
    if (p.x > bgCanvas.width) p.x = 0;
    if (p.y < 0) p.y = bgCanvas.height;
    if (p.y > bgCanvas.height) p.y = 0;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(100, 130, 180, ${p.alpha * 0.25})`;
    bgCtx.fill();
  }
  requestAnimationFrame(drawBg);
}

resizeBg();
initBgParticles();
drawBg();
window.addEventListener("resize", () => { resizeBg(); initBgParticles(); });

  .join("line")
  .attr("class", "link-line")
  .attr("stroke", d => {
    if (d.type === "primary") return "#94a3b8";
    if (d.type === "contains") return "#cbd5e0";
    return "#a0aec0";
  })
  .attr("stroke-width", d => d.type === "primary" ? 2.5 : d.type === "contains" ? 1.5 : 1.2)
  .attr("stroke-dasharray", d => d.type === "relation" ? "6,4" : "none")
  .attr("marker-end", d => d.type === "primary" ? "url(#arrowhead)" : "");

const linkLabels = linkGroup.selectAll("text")
  .data(links.filter(d => d.label))
  .join("text")
  .attr("class", "link-label")
  .text(d => d.label);

// Particle system on primary links
const particleCanvas = document.createElement("canvas");
particleCanvas.style.cssText = "position:fixed;top:0;left:0;z-index:2;pointer-events:none;";
document.body.appendChild(particleCanvas);
const pCtx = particleCanvas.getContext("2d");
particleCanvas.width = width;
particleCanvas.height = height;

let linkParticles = [];
const primaryLinks = links.filter(d => d.type === "primary");

function spawnLinkParticle() {
  for (const link of primaryLinks) {
    if (Math.random() > 0.03) continue;
    const s = link.source, t = link.target;
    if (!s.x || !t.x) continue;
    linkParticles.push({
      x: s.x, y: s.y,
      tx: t.x, ty: t.y,
      progress: 0,
      speed: 0.008 + Math.random() * 0.008,
      color: GROUP_COLORS[s.group]?.main || "#fff",
    });
  }
}

function drawLinkParticles() {
  const transform = d3.zoomTransform(svg.node());
  pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  pCtx.save();
  pCtx.translate(transform.x, transform.y);
  pCtx.scale(transform.k, transform.k);

  spawnLinkParticle();

  linkParticles = linkParticles.filter(p => p.progress < 1);
  for (const p of linkParticles) {
    p.progress += p.speed;
    const x = p.x + (p.tx - p.x) * p.progress;
    const y = p.y + (p.ty - p.y) * p.progress;
    const alpha = Math.sin(p.progress * Math.PI) * 0.8;
    pCtx.beginPath();
    pCtx.arc(x, y, 2, 0, Math.PI * 2);
    const r = parseInt(p.color.slice(1,3), 16);
    const gg = parseInt(p.color.slice(3,5), 16);
    const b = parseInt(p.color.slice(5,7), 16);
    pCtx.fillStyle = `rgba(${r},${gg},${b},${alpha})`;
    pCtx.shadowColor = p.color;
    pCtx.shadowBlur = 8;
    pCtx.fill();
    pCtx.shadowBlur = 0;
  }
  pCtx.restore();
  requestAnimationFrame(drawLinkParticles);
}

drawLinkParticles();

window.addEventListener("resize", () => {
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
});

// Nodes
const nodeGroup = g.append("g").attr("class", "nodes");

const nodeGs = nodeGroup.selectAll("g")
  .data(nodes)
  .join("g")
  .attr("cursor", "pointer")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended));

// Outer glow circle
nodeGs.append("circle")
  .attr("class", "node-glow")
  .attr("r", d => LEVEL_RADIUS[d.level] + 8)
  .attr("fill", d => GROUP_COLORS[d.group]?.glow || "#ffffff30")
  .attr("opacity", 0.3);

// Main circle
nodeGs.append("circle")
  .attr("class", "node-circle")
  .attr("r", d => LEVEL_RADIUS[d.level])
  .attr("fill", d => {
    const c = GROUP_COLORS[d.group]?.main || "#888";
    if (d.level === 1) return c;
    if (d.level === 2) return "#fff";
    return "#fafbfc";
  })
  .attr("stroke", d => GROUP_COLORS[d.group]?.main || "#888")
  .attr("filter", d => d.level === 1 ? "url(#glow)" : "none");

// Label
nodeGs.append("text")
  .attr("class", "node-label")
  .attr("dy", d => LEVEL_RADIUS[d.level] + 16)
  .attr("font-size", d => d.level === 1 ? 13 : d.level === 2 ? 11 : 9)
  .text(d => d.label);

// Hover & click
nodeGs.on("mouseenter", function(event, d) {
  d3.select(this).select(".node-circle")
    .transition().duration(200)
    .attr("r", LEVEL_RADIUS[d.level] * 1.3)
    .attr("filter", "url(#glow-strong)");
  d3.select(this).select(".node-glow")
    .transition().duration(200)
    .attr("r", LEVEL_RADIUS[d.level] * 1.3 + 12)
    .attr("opacity", 0.6);

  // Dim unconnected
  const connected = new Set();
  connected.add(d.id);
  links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  nodeGs.transition().duration(200).attr("opacity", n => connected.has(n.id) ? 1 : 0.2);
  linkLines.transition().duration(200).attr("opacity", l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    return (sid === d.id || tid === d.id) ? 0.8 : 0.06;
  });
});

nodeGs.on("mouseleave", function(event, d) {
  d3.select(this).select(".node-circle")
    .transition().duration(300)
    .attr("r", LEVEL_RADIUS[d.level])
    .attr("filter", d.level === 1 ? "url(#glow)" : "none");
  d3.select(this).select(".node-glow")
    .transition().duration(300)
    .attr("r", LEVEL_RADIUS[d.level] + 8)
    .attr("opacity", 0.3);
  nodeGs.transition().duration(300).attr("opacity", 1);
  linkLines.transition().duration(300).attr("opacity", 1);
});

nodeGs.on("click", (event, d) => {
  event.stopPropagation();
  openPanel(d);
});

svg.on("click", () => closePanel());

// Simulation tick
simulation.on("tick", () => {
  linkLines
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  linkLabels
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2);

  nodeGs.attr("transform", d => `translate(${d.x},${d.y})`);

  // Update particle targets
  for (const p of linkParticles) {
    const link = primaryLinks.find(l =>
      (l.source.id || l.source) === (p.sourceId) &&
      (l.target.id || l.target) === (p.targetId)
    );
  }
});

function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  if (!event.sourceEvent.shiftKey) {
    d.fx = null;
    d.fy = null;
  }
}

// ============================================================
// DETAIL PANEL
// ============================================================
function openPanel(d) {
  const panel = document.getElementById("detail-panel");
  const color = GROUP_COLORS[d.group]?.main || "#888";
  const statusColor = STATUS_COLORS[d.status] || "#888";

  document.getElementById("panel-group").textContent = d.group;
  document.getElementById("panel-group").style.color = color;
  document.getElementById("panel-title").textContent = d.label;
  document.getElementById("panel-title").style.color = color;

  const statusEl = document.getElementById("panel-status");
  statusEl.textContent = d.status;
  statusEl.style.background = statusColor + "20";
  statusEl.style.color = statusColor;

  let bodyHTML = "";

  if (d.detail) {
    if (d.detail.summary) {
      bodyHTML += `<div class="detail-text" style="margin-top:16px;">${d.detail.summary}</div>`;
    }
    if (d.detail.points && d.detail.points.length) {
      bodyHTML += `<h3>要点</h3><ul>`;
      for (const p of d.detail.points) {
        bodyHTML += `<li style="color:${color}">${p}</li>`;
      }
      bodyHTML += `</ul>`;
    }
    if (d.detail.tags && d.detail.tags.length) {
      bodyHTML += `<h3>标签</h3><div style="margin-top:8px;">`;
      for (const t of d.detail.tags) {
        bodyHTML += `<span class="tag" style="border:1px solid ${color}30; color:${color}">${t}</span>`;
      }
      bodyHTML += `</div>`;
    }
  }

  // Show connections
  const connections = [];
  links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if (sid === d.id) {
      const target = nodes.find(n => n.id === tid);
      if (target && l.label) connections.push({ label: l.label, node: target.label, dir: "→" });
    }
    if (tid === d.id) {
      const source = nodes.find(n => n.id === sid);
      if (source && l.label) connections.push({ label: l.label, node: source.label, dir: "←" });
    }
  });

  if (connections.length) {
    bodyHTML += `<h3>关联</h3><ul>`;
    for (const c of connections) {
      bodyHTML += `<li style="color:#888">${c.dir} ${c.node} <span style="opacity:0.5">(${c.label})</span></li>`;
    }
    bodyHTML += `</ul>`;
  }

  document.getElementById("panel-body").innerHTML = bodyHTML;
  panel.classList.add("open");
}

function closePanel() {
  document.getElementById("detail-panel").classList.remove("open");
}

// ============================================================
// FILTER BUTTONS
// ============================================================
document.querySelectorAll("#filters button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#filters button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filter = btn.dataset.filter;

    nodeGs.transition().duration(400).attr("opacity", d => {
      if (filter === "all") return 1;
      return d.group === filter ? 1 : 0.08;
    });

    linkLines.transition().duration(400).attr("opacity", l => {
      if (filter === "all") return 1;
      const sid = typeof l.source === "object" ? l.source.id : l.source;
      const tid = typeof l.target === "object" ? l.target.id : l.target;
      const sNode = nodes.find(n => n.id === sid);
      const tNode = nodes.find(n => n.id === tid);
      return (sNode?.group === filter || tNode?.group === filter) ? 0.5 : 0.02;
    });
  });
});

// Keyboard shortcut
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closePanel();
});
</script>
</body>
